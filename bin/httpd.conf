<VirtualHost *:80>
    ServerAdmin webmaster@example.com
    DocumentRoot "/www/wwwroot/prestashop"
    ServerName 192.168.0.78
    ServerAlias 192.168.0.78 123.183.8.242
    #errorDocument 404 /404.html
    ErrorLog "/www/wwwlogs/kjds-error_log"
    CustomLog "/www/wwwlogs/kjds-access_log" combined

    #PHP
    <FilesMatch \.php$>
            SetHandler "proxy:unix:/tmp/php-cgi-81.sock|fcgi://localhost"
    </FilesMatch>


    #DENY FILES
     <Files ~ (\.user.ini|\.htaccess|\.git|\.env|\.svn|\.project|LICENSE|README.md)$>
       Order allow,deny
       Deny from all
    </Files>

    # 接口代理配置
    ProxyPass /prod-api/ http://127.0.0.1:18866/
    ProxyPassReverse /prod-api/ http://127.0.0.1:18866/

    # 商城
    <Directory "/www/wwwroot/prestashop">
        SetOutputFilter DEFLATE
        Options FollowSymLinks
        AllowOverride All
        Require all granted
        DirectoryIndex index.php index.html index.htm default.php default.html default.htm
    </Directory>

    # 设计
    Alias /design "/www/wwwroot/design"
    <Directory "/www/wwwroot/design">
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
        DirectoryIndex index.html index.php index.htm default.php default.html default.htm

        # 重写规则，确保历史模式路由正常工作
        <IfModule mod_rewrite.c>
          RewriteEngine On
          RewriteBase /design/
          RewriteRule ^index\.html$ - [L]
          RewriteCond %{REQUEST_FILENAME} !-f
          RewriteCond %{REQUEST_FILENAME} !-d
          RewriteRule . /design/index.html [L]
        </IfModule>
    </Directory>
</VirtualHost>
